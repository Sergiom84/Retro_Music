name: RetroMusic
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    ALWAYS_SEARCH_USER_PATHS: "NO"
targets:
  RetroMusiciOS:
    type: application
    platform: iOS
    sources:
      - path: RetroMusicAppiOS/RetroMusicAppiOS
      - path: Shared
    dependencies:
      - target: RetroMusicWatch
        embed: true
      - sdk: WatchConnectivity.framework
      - sdk: AVFoundation.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sergi.retromusic
        PRODUCT_NAME: RetroMusic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: RetroMusic
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
        SUPPORTS_MACCATALYST: "NO"

  RetroMusicWatch:
    type: application
    platform: watchOS
    sources:
      - path: RetroMusicAppWatch/RetroMusicAppWatch
      - path: Shared
    dependencies:
      - sdk: WatchConnectivity.framework
      - sdk: AVFoundation.framework
      - sdk: MediaPlayer.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sergi.retromusic.watchkitapp
        PRODUCT_NAME: RetroMusicWatch
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: RetroMusicAppWatch/RetroMusicAppWatch/Info.plist
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_STYLE: Automatic
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SUPPORTED_PLATFORMS: "watchsimulator watchos"
        OTHER_LDFLAGS: "$(inherited) -framework WatchConnectivity -framework AVFoundation -framework MediaPlayer"

schemes:
  RetroMusiciOS:
    build:
      targets:
        RetroMusiciOS: all
  RetroMusicWatch:
    build:
      targets:
        RetroMusicWatch: all
  RetroMusic:
    build:
      targets:
        RetroMusiciOS: all
        RetroMusicWatch: all
